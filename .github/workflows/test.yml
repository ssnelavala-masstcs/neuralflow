name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - run: pnpm install
        working-directory: apps/desktop
      - run: pnpm typecheck
        working-directory: apps/desktop
      - run: pnpm lint
        working-directory: apps/desktop

  test-sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install sidecar with dev deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
        working-directory: packages/sidecar
      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v
        working-directory: packages/sidecar
