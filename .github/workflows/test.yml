name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - run: pnpm install
        working-directory: apps/desktop
      - run: pnpm typecheck
        working-directory: apps/desktop
      - run: pnpm lint
        working-directory: apps/desktop

  test-sidecar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install sidecar + test deps
        run: |
          cd packages/sidecar
          uv sync --extra dev
      - name: Run tests
        run: |
          cd packages/sidecar
          uv run pytest tests/ -v
