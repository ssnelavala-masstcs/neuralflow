[project]
name = "neuralflow-sidecar"
version = "0.1.0"
description = "NeuralFlow Python sidecar — FastAPI execution backend"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "sqlalchemy>=2.0.30",
    "aiosqlite>=0.20.0",
    "alembic>=1.13.0",
    "litellm>=1.40.0",
    "crewai>=0.80.0",
    "langgraph>=0.2.0",
    "mcp>=1.0.0",
    "httpx>=0.27.0",
    "sse-starlette>=2.1.0",
    "apscheduler>=3.10.0",
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
tools = [
    "playwright>=1.44.0",
    "beautifulsoup4>=4.12.0",
    "pandas>=2.2.0",
]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
dev-dependencies = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
